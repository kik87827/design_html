<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" type="text/css" href="./assets/css/base.css" />
  <title>EQL</title>

</head>

<body>
  <div id="app">
    <header class="header-wrap">
      <div class="header-inner">
        <h1 class="toplogo">
          <a href="#" class="toplogo-link"><span class="toplogo-img">Sample Project</span><span class="toplogo-text">고도화
              퍼블리싱</span></a>
        </h1>
        <div class="header-main-cols">
          <nav class="nav-wrap">
            <ul class="nav-list">
              <li>
                <a href="index.html" class="nav-item" id="publish" target="_parent">PUBLISING LIST</a>
              </li>
              <li>
                <a href="source_list.html" class="nav-item" id="sourceList" target="_parent">퍼블리소스</a>
              </li>
              <li>
                <a href="common_history.html" class="nav-item" id="devsend" target="_parent">퍼블공통
                  작업내역</a>
              </li>
              <li><a href="/guide/components.html" class="nav-item" id="components" target="_parent">COMPONENTS</a></li>
            </ul>
            <script>
              const menuitem = document.querySelector("#components");
              if (!!menuitem) {
                menuitem.classList.add("active");
              }
            </script>
          </nav>
        </div>
      </div>
    </header>
    <section class="middle-wrap">
      <div class="middle-templete">
        <div class="middle-right-cols">
          <div class="middle-right-content">
            <div class="middle-right-title-row">
              <h3 class="middle-right-title">컴포넌트 가이드</h3>
            </div>
            <div class="comp_wrap">
              <div class="comp_item">
                <h4>Button</h4>

                <div class="preview">
                  <button class="btn">Primary</button>
                  <button class="btn sub">Secondary</button>
                </div>

                <div class="code">
                  <button type="button" class="code_copy" aria-label="코드 복사">Copy</button>
                  <pre></pre>
                </div>
              </div>

              <div class="comp_item">
                <h4>Input</h4>

                <div class="preview">
                  <input class="input" placeholder="텍스트 입력" />
                </div>

                <div class="code">
                  <button type="button" class="code_copy" aria-label="코드 복사">Copy</button>
                  <pre></pre>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
  <script>
    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function getCodeHtml(preview) {
      return preview.innerHTML
        .replace(/^\n+|\n+$/g, "")
        .replace(/^\s+/gm, "");
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.top = "-9999px";
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      document.body.removeChild(textarea);
    }

    document.querySelectorAll(".comp_item").forEach((comp) => {
      const preview = comp.querySelector(".preview");
      const code = comp.querySelector(".code pre");
      const copyButton = comp.querySelector(".code_copy");

      if (!preview || !code || !copyButton) return;

      const html = getCodeHtml(preview);
      code.innerHTML = escapeHtml(html);

      copyButton.addEventListener("click", async () => {
        try {
          await copyText(html);
          copyButton.classList.add("is_done");
          copyButton.textContent = "✓";
          clearTimeout(copyButton._timer);
          copyButton._timer = setTimeout(() => {
            copyButton.classList.remove("is_done");
            copyButton.textContent = "Copy";
          }, 1500);
        } catch (error) {
          copyButton.textContent = "Fail";
          clearTimeout(copyButton._timer);
          copyButton._timer = setTimeout(() => {
            copyButton.textContent = "Copy";
          }, 1500);
        }
      });
    });
  </script>
</body>

</html>
