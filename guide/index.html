      td.end {

        color: #fff;

  <body>

                <!-- <li><a href="/guide/preview.html" class="nav-item" id="preview" target="_parent">퍼블형상트리</a></li> -->

                <!-- <li><a href="/guide/components_pc.html" class="nav-item" id="components" target="_parent">COMPONENTS</a></li> -->

              </script>
            </nav>

      </header>
      <section class="middle-wrap">
        <div class="middle-templete">
          <div class="middle-left-cols">
            <div class="middle-left-item">
              <div class="left-block">
                <div class="middle-left-title-wrap">
                  <h2 class="middle-left-title">PC</h2>
                </div>
                <ul class="middle-menu-list"></ul>
              </div>
            </div>
          </div>
          <div class="middle-right-cols">
            <div class="middle-right-content">
              <!-- <div class="middle-right-title-row">
                    <h3 class="middle-right-title">전체 현황</h3>
                    <div class="middle-right-title-count-wrap">
                      <p class="middle-right-title-count">
                        End page : <span class="current-count">0</span>page / 
                        Total page : <span class="total-count">0</span>page / 
                        진행율 : <span class="current-count-per">0</span>%
                      </p>
                    </div>
                  </div> -->
              <div class="vertical-cont-item-wrap"></div>
            </div>
          </div>
        </div>
      </section>
      <script type="module">
        const set_location = "./pub_data/";
        const set_category = [
          set_location + "/data_co.json",
          set_location + "/data_pr.json",
          set_location + "/data_br.json",
          set_location + "/data_ev.json",
          set_location + "/data_me.json",
          set_location + "/data_or.json",
          set_location + "/data_my.json",
        ];
        document.addEventListener("DOMContentLoaded", async function () {
          await pageDraw();
          pageHandler();
          currentCheck();
        });
        async function pageDraw() {
          const vcitemWrap = document.querySelector(".vertical-cont-item-wrap");
          const middleMenuList = document.querySelector(".middle-menu-list");
          for (const [index, citem] of set_category.entries()) {
            try {
              const response = await fetch(citem);
              const citem_data = await response.json();
              // 각 카테고리 데이터를 처리하여 메뉴 리스트와 콘텐츠를 채우기
              for (const category in citem_data) {
                // 카테고리에 해당하는 메뉴를 middleMenuList에 추가
                console.log(category);
                middleMenuList.innerHTML += `
                        <li><a href="javascript:;" class="middle-menu">${category}</a></li>
                      `;
                // 카테고리 내부의 데이터를 테이블로 출력
                vcitemWrap.innerHTML += `
                        <div class="vertical-cont-item">
                          <div class="vertical-cont-title-wrap">
                            <p class="vertical-cont-title">${category}</p>
                            <p class="middle-right-title-count">
                              End page : <span class="current-count">0</span>page / 
                              Total page : <span class="total-count">0</span>page / 
                              진행율 : <span class="current-count-per">0</span>%
                            </p>
                          </div>
                          <div class="vertical-cont-content">
                            <div class="codinglist-tb-wrap">
                              <table class="codinglist-tb">
                                <thead>
                                  <tr>
                                    <th class="num" style="width:20px">no.</th>
                                    <th class="depth" style="width:300px">화면 내용</th>
                                    <th class="depth" style="width:80px">화면 ID</th>
                                    <th class="screen-id" style="width:150px">화면명</th>
                                    <th class="worker" style="width:60px">담당자</th>
                                    <th class="work" style="width:40px">현황</th>
                                    <th class="else" style="width:400px">비고</th>
                                  </tr>
                                </thead>
                                <tbody>
                                  ${citem_data[category]
                                    .map(
                                      (item, index) => `
                                      <tr>
                                        <td class="num">${index + 1}</td>
                                        <td class="depth txtleft">
                                          <a href="${
                                            item.menuLink
                                          }" target="_blank" class="screen-link">
                                            ${item.menuName}
                                          </a>
                                        </td>
                                        <td class="screen-id">
                                          <a href="${
                                            item.menuLink
                                          }" target="_blank" class="screen-link">
                                            ${item.screenID}
                                          </a>
                                        </td>
                                         <td class="screen-id">
                                          <a href="${
                                            item.menuLink
                                          }" target="_blank" class="screen-link">
                                            ${item.screenName}
                                          </a>
                                        </td>
                                        <td class="worker">${item.staff}</td>
                                        <td class="work ${caseAction(
                                          item.current
                                        )}">${item.current}</td>
                                        <td class="else txtleft">${
                                          item.note
                                        }</td>
                                      </tr>`
                                    )
                                    .join("")}
                                </tbody>
                              </table>
                            </div>
                          </div>
                        </div>
                      `;
              }
            } catch (error) {
              console.error(`데이터 불러오기 실패 (${citem})`, error);
            }
          }
          function caseAction(current) {
            if (current === "진행중") {
              return "ing";
            } else if (current === "설계완료") {
              return "semi_end";
            } else if (current === "완료") {
              return "end";
            } else if (current === "대기중") {
              return "wait";
            } else {
              return "";
            }
          }
        }
        function pageHandler() {
          const middleMenu = document.querySelectorAll(".middle-menu");
          const verticalContItem = Array.from(
            document.querySelectorAll(".vertical-cont-item")
          );
          let activeMenu = null;
          middleMenu.forEach((item, menuIndex) => {
            item.addEventListener("click", (e) => {
              e.preventDefault();
              const etarget = e.currentTarget;
              if (activeMenu && etarget !== activeMenu) {
                activeMenu.classList.remove("active");
              }
              etarget.classList.toggle("active");
              verticalContItem.forEach((item, contIndex) => {
                if (!etarget.classList.contains("active")) {
                  item.classList.remove("none");
                  return;
                }
                if (menuIndex !== contIndex) {
                  item.classList.add("none");
                } else {
                  item.classList.remove("none");
                }
              });
              activeMenu = etarget;
            });
          });
        }
        function currentCheck() {
          const verticalContItem = Array.from(
            document.querySelectorAll(".vertical-cont-item")
          );
          verticalContItem.forEach((vci) => {
            const currentCount = vci.querySelector(".current-count");
            const totalCount = vci.querySelector(".total-count");
            const currentCountPer = vci.querySelector(".current-count-per");
            const ctr = vci.querySelectorAll(".codinglist-tb tbody tr");
            const tdEnd = vci.querySelectorAll(".codinglist-tb td.end");
            const tdIng = vci.querySelectorAll(".codinglist-tb td.ing");
            currentCount.textContent = `${tdEnd.length}`;
            totalCount.textContent = `${ctr.length}`;
            currentCountPer.textContent = `${Math.floor(
              (tdEnd.length / ctr.length) * 100
            )}`;
          });
        }
      </script>
    </div>
  </body>
</html>
