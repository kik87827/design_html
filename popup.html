<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./resources/css/style.css" rel="stylesheet" />
    <script src="./resources/js/ui.js"></script>
    <title>Document</title>
  </head>
  <body>
    <div class="page_wrap">
      <a href="#" class="btn_guide_box" id="btnCall">팝업1 호출</a>
      <!-- <a href="#" class="btn_guide_box" id="btnInstanceTest">팝업1 닫기 콜백 호출</a> -->
      <a href="#" class="btn_guide_box" id="btnCall2">팝업 2 호출</a>
      <!-- <a href="#" class="btn_guide_box" id="btnInstanceTest3">팝업2 닫기 콜백 호출</a> -->
      <!-- popup -->
      <div class="popup_wrap" id="samplePopup">
        <div class="bg_dim"></div>
        <div class="popup_item">
          <div class="popup_title_row">
            <h3 class="popup_title">팝업 타이틀</h3>
          </div>
          <div class="popup_contents_row">팝업 내용이 들어갑니다.</div>
          <button class="btn_popup_close"></button>
        </div>
      </div>
      <div class="popup_wrap" id="samplePopup2">
        <div class="bg_dim"></div>
        <div class="popup_box_tb_wrap">
          <div class="popup_box_tb">
            <div class="popup_box_td">
              <div class="popup_box_container">
                <div class="popup_sections_wrap">
                  <p class="popup_sec_main_copy">
                    <em class="color_em">종료 임박</em>
                    상품입니다.
                  </p>
                  <p class="popup_sec_sub_copy">
                    사용기한이 지나면
                    <br />
                    상품을 더 이상 신청할 수 없어요
                  </p>
                </div>
                <div class="popup_btn_wrap btn_quad_wrap">
                  <a href="#" class="btn_quad primary size2 close_trigger"><span class="text_node">확인</span></a>
                </div>
                <button class="btn_popup_close"></button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- // popup -->
      <script>
        document.addEventListener('DOMContentLoaded', function () {
          // 인스턴스 선언
          let designPopup = new DesignPopup({
            selector: '#samplePopup',
            beforeCallback() {},
            callback() {},
            closeCallback() {},
          });
          // designPopup.popupShow(); // show
          // designPopup.popupShow(); // hide

          let designPopup2 = new DesignPopup({
            selector: '#samplePopup2',
            beforeCallback() {},
            callback() {},
            closeCallback() {},
          });
          designPopup2.popupShow(); // show
          // designPopup2.popupShow(); // hide

          // event
          document.querySelector('#btnCall')?.addEventListener('click', () => {
            designPopup.popupShow(); // show
          });
          document.querySelector('#btnCall2')?.addEventListener('click', () => {
            designPopup2.popupShow(); // show
          });
          document.querySelector('#btnInstanceTest')?.addEventListener('click', () => {
            designPopup.popupHide({
              beforeClose() {
                console.log('samplePopup instance - beforeClose');
              },
              closeCallback() {
                console.log('samplePopup instance - closeCallback');
              },
            });
          });
          document.querySelector('#btnInstanceTest2')?.addEventListener('click', () => {
            designPopup2.popupHide({
              beforeClose() {
                console.log('samplePopup instance 2 - beforeClose');
              },
              closeCallback() {
                console.log('samplePopup instance 2 - closeCallback');
              },
            });
          });
        });
      </script>
    </div>
  </body>
</html>
